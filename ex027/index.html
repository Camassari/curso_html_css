<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(255, 231, 199);
            color: rgb(37, 19, 6);
        }
        
        h1 {
            background-color: rgb(205, 184, 158);
            text-align: center;
            height: 300px;
            width: 300px;

            border-left: 10px solid rgb(39, 29, 18); /* width / style / color */
            border-right: 10px solid rgb(39, 29, 18);

            padding: 10px;
            margin: auto;
        }

        p {
            text-align: justify;
        }

        a {
            color: black;
        }

        a:hover {
            color: rgb(121, 65, 25);
        }
    </style>
</head>
<body>
    <h1>Modelo de Caixas</h1>
    <p>Eu sou um exemplo de box leve, mas os <a href="#">links são exemplo de inline-level</a>. Vamos ver tudo isso</p>
</body>
</html>
