<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <form action="cadastros/cadastro.html" method="post">
        <p>
            <label for="irange">Número: </label>
            <input type="range" name="range" id="irange" min="0" max="50" oninput="inum.value = Number(irange.value)">
        </p>
        <p>
            <label for="inum">Output: </label>
            <output id="inum">0</output>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
