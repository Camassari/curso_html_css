<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <form action="cadastros/cadastro.html" method="get">
        <p>
            <label for="iano">Digite seu ano de nascimento</label>
            <input type="number" name="idade" id="iano" oninput="calcular_idade()">
        </p>
        <p>
            <output id="iidade">0</output>
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    <script>
        function calcular_idade() {
            let atual = new Date().getFullYear()
            iidade.innerHTML = atual - Number(iano.value)
        }
    </script>
</body>
</html>
