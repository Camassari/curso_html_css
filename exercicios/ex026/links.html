<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoelementos</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
        }

        a:visited {
            color: purple;
        }
        
        a:hover {
            text-decoration: underline;
        }

        a::after {
            content: ' [link]';
            color: rgb(67, 67, 67);
        }
    </style>
</head>
<body>
    <h1>Pseudoelementos</h1>
    <h2>Personalizando links</h2>
    <ul>
        <li><a href="https://github.com/Camassari/buroku">Repositório github</a></li>
        <li><a href="https://www.youtube.com/watch?v=b7zT94WV-Ek">Youtube</a></li>
        <li><a href="https://www.cursoemvideo.com/curso/curso-html5-e-css3-modulo-2-de-5-40-horas/aulas/modulo-2-2/modulos/capitulo-15-aula-04-pseudo-elementos-em-css/">Curso em vídeo</a></li>
    </ul>
</body>
</html>
