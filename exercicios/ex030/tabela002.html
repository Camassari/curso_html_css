<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        th, td{
            border: 1px solid black;
            padding: 10px;
        }

        td.num {
            text-align: right;
        }

        thead, tfoot {
            background-color: rgb(126, 126, 126);
            color: white;
        }

    </style>
</head>
<body>
    <h1>Uso de tabelas grandes</h1>
    <!-- 
    Anatomia para tabelas maiores:
    TABLE
        HEAD
            TR, TD, TH
        BODY (ESSENCIAL)
            TR, TD, TH
        FOOT
            TR, TD, TH
    -->

    <table>
        <thead>
            <th>Estados</th>
            <th>População</th>
        </thead>
        <tbody>
            <tr>
                <td>São Paulo</td>
                <td class="num">46 081 801</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21 393 441</td>                
            </tr>
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17 223 547</td>                
            </tr>
            <tr>
                <td>Bahia</td>
                <td class="num">14 870 907	</td>                
            </tr>
            <tr>
                <td>Paraná</td>
                <td class="num">11 890 517</td>                
            </tr>
        </tbody>
        <tfoot>
            <th>Total de habitantes</th>
            <td><strong>111.460.213</strong></td>
        </tfoot>
    </table>
</body>
</html>
