<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áudios</title>
</head>
<body>
    <h1>Audio</h1>
    <h2>Vamos tocar um pouco de música de qualidade</h2>
    <!-- MP3 WAV OGG -->
    <audio src="midia/5_5.mp3" controls></audio>

    <!-- source:src -->
    <p>Segunda maneira de cria audio</p>
    <audio preload="metadata" controls>
        <source src="midia/5_5.mp3" type="audio/mpeg">
        <p>Não conseguir reproduzir o audio, clique aqui para baixar <a href="midia/5_5.mp3">BAIXAR ARQUIVO</a></p>
    </audio>
</body>
</html>
